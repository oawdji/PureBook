version: "3.8"

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: purebook-nginx
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - purebook-network

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: purebook-app
    expose:
      - "3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - purebook-network

  postgres:
    image: postgres:16-alpine
    container_name: purebook-postgres
    expose:
      - "5432"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-purebook}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-purebook123}
      - POSTGRES_DB=${POSTGRES_DB:-purebook}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-purebook} -d ${POSTGRES_DB:-purebook}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - purebook-network

  redis:
    image: redis:7-alpine
    container_name: purebook-redis
    expose:
      - "6379"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - purebook-network

volumes:
  pgdata:

networks:
  purebook-network:
    driver: bridge
